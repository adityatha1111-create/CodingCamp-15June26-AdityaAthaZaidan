<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- ===== HEADER: Greeting Panel + Theme Toggle ===== -->
    <header class="dashboard-header">

      <div class="greeting-panel">
        <div class="greeting-time-date">
          <span id="greeting-time" aria-label="Current time"></span>
          <span id="greeting-date" aria-label="Current date"></span>
        </div>

        <p class="greeting-message">
          <span id="greeting-text" aria-label="Greeting message"></span>
        </p>

        <form id="name-form" class="name-form" novalidate>
          <label for="name-input" class="name-label">Your name</label>
          <div class="name-form-row">
            <input
              type="text"
              id="name-input"
              class="name-input"
              placeholder="Enter your name…"
              maxlength="50"
              autocomplete="off"
              aria-describedby="name-error"
            />
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
          <p id="name-error" class="error-msg" aria-live="polite"></p>
        </form>
      </div>

      <div class="header-controls">
        <button
          id="theme-toggle"
          class="btn btn-icon theme-toggle"
          type="button"
          aria-label="Toggle dark mode"
        >
          <span class="theme-icon theme-icon--light" aria-hidden="true">☀️</span>
          <span class="theme-icon theme-icon--dark"  aria-hidden="true">🌙</span>
        </button>
      </div>

    </header>

    <!-- ===== MAIN: Timer + Tasks ===== -->
    <main class="dashboard-main">

      <!-- Focus Timer Card -->
      <section class="card timer-card" aria-labelledby="timer-heading">
        <h2 id="timer-heading" class="card-title">Focus Timer</h2>

        <div
          id="timer-display"
          class="timer-display"
          role="timer"
          aria-label="Countdown timer"
          aria-live="off"
        >25:00</div>

        <p
          id="timer-complete-msg"
          class="timer-complete-msg"
          role="status"
          aria-live="polite"
          hidden
        >Session complete! Great work. 🎉</p>

        <div class="timer-controls">
          <button id="btn-start" class="btn btn-primary" type="button">Start</button>
          <button id="btn-stop"  class="btn btn-secondary" type="button" disabled>Stop</button>
          <button id="btn-reset" class="btn btn-ghost"     type="button">Reset</button>
        </div>
      </section>

      <!-- Task Manager Card -->
      <section class="card tasks-card" aria-labelledby="tasks-heading">
        <h2 id="tasks-heading" class="card-title">Tasks</h2>

        <form id="task-form" class="add-form" novalidate>
          <div class="add-form-row">
            <input
              type="text"
              id="task-input"
              class="add-input"
              placeholder="Add a new task…"
              maxlength="500"
              autocomplete="off"
              aria-describedby="task-error"
            />
            <button type="submit" class="btn btn-primary">Add</button>
          </div>
          <p id="task-error" class="error-msg" aria-live="polite"></p>
        </form>

        <ul id="task-list" class="task-list" aria-label="Task list" role="list"></ul>
      </section>

    </main>

    <!-- ===== FOOTER: Quick Links ===== -->
    <footer class="dashboard-footer">

      <section class="card links-card" aria-labelledby="links-heading">
        <h2 id="links-heading" class="card-title">Quick Links</h2>

        <form id="link-form" class="add-form links-form" novalidate>
          <div class="links-form-inputs">
            <input
              type="text"
              id="link-label-input"
              class="add-input"
              placeholder="Label (e.g. GitHub)"
              maxlength="50"
              autocomplete="off"
              aria-label="Link label"
              aria-describedby="link-error"
            />
            <input
              type="url"
              id="link-url-input"
              class="add-input"
              placeholder="https://example.com"
              maxlength="2048"
              autocomplete="off"
              aria-label="Link URL"
              aria-describedby="link-error"
            />
            <button type="submit" class="btn btn-primary">Add</button>
          </div>
          <p id="link-error" class="error-msg" aria-live="polite"></p>
        </form>

        <div id="links-container" class="links-container" aria-label="Saved links"></div>
      </section>

    </footer>

    <script src="js/app.js" defer></script>
  </body>
</html>
